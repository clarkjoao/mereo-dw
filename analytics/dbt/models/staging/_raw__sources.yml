version: 2

sources:
  - name: raw
    description: Landing CDC multi-tenant (Debezium → Kafka → ClickHouse raw).
    database: raw
    schema: raw
    tables:
      - name: colaborador
        description: dbo.COLABORADOR unificado por tenant_slug. Contrato em analytics/catalog/entities/colaborador.yaml
        columns:
          - name: id
            description: PK (dbo.COLABORADOR.ID)
            tests:
              - not_null
          - name: tenant_slug
            tests:
              - not_null
          - name: nome
          - name: email
          - name: id_grupo_usuario
          - name: ativo
          - name: _ts_ms
          - name: _deleted
