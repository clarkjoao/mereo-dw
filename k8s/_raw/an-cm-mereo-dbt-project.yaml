apiVersion: v1
data:
  dbt_project.yml: "name: mereo_analytics\nversion: 1.0.0\nconfig-version: 2\nprofile: mereo_clickhouse\n\nmodel-paths: [\"models\"]\nanalysis-paths: [\"analyses\"]\ntest-paths: [\"tests\"]\nseed-paths: [\"seeds\"]\nmacro-paths: [\"macros\"]\nsnapshot-paths: [\"snapshots\"]\n\ntarget-path: target\nclean-targets:\n  - target\n  - dbt_packages\n\nmodels:\n  mereo_analytics:\n    staging:\n      +materialized: view\n    gold:\n      +materialized: table\n\nvars:\n  raw_database: raw\n  gold_database: gold\n"
  packages.yml: "packages:\n  - package: dbt-labs/dbt_utils\n    version: 1.3.0\n"
  profiles.yml: "mereo_clickhouse:\n  target: dev\n  outputs:\n    dev:\n      type: clickhouse\n      schema: gold\n      host: localhost\n      port: 18123\n      user: dbt\n      password: \"{{ env_var('CH_DBT_PASSWORD') }}\"\n      secure: false\n      verify: false\n    k8s:\n      type: clickhouse\n      schema: gold\n      host: clickhouse-mereo-clickhouse.mereo-clickhouse.svc.cluster.local\n      port: 8123\n      user: dbt\n      password: \"{{ env_var('CH_DBT_PASSWORD') }}\"\n      secure: false\n      verify: false\n"
kind: ConfigMap
metadata:
  name: mereo-dbt-project
  namespace: mereo-analytics
