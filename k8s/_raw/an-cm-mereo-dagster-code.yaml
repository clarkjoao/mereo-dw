apiVersion: v1
data:
  __init__.py: '"""Mereo analytics Dagster code location."""

    '
  definitions.py: "\"\"\"Dagster definitions for Mereo analytics (dbt + ClickHouse).\"\"\"\n\nimport os\nfrom pathlib import Path\n\nimport clickhouse_connect\nfrom dagster import (\n    AssetExecutionContext,\n    DefaultScheduleStatus,\n    DefaultSensorStatus,\n    Definitions,\n    RunRequest,\n    ScheduleDefinition,\n    SensorEvaluationContext,\n    define_asset_job,\n    sensor,\n)\nfrom dagster_dbt import DbtCliResource, DbtProject, dbt_assets\n\n_analytics_root = Path(__file__).parent.parent.parent\nDBT_PROJECT_DIR = Path(os.environ.get(\"DBT_PROJECT_DIR\", _analytics_root / \"dbt\"))\n_dbt_exe = os.environ.get(\"DBT_EXECUTABLE\")\nDBT_EXECUTABLE = Path(_dbt_exe) if _dbt_exe else Path(__file__).parent.parent / \".venv\" / \"bin\" / \"dbt\"\n\nPILOT_ENTITY = os.environ.get(\"MEREPO_PILOT_ENTITY\", \"colaborador\")\nCH_HOST = os.environ.get(\"CH_HOST\", \"localhost\")\nCH_PORT = int(os.environ.get(\"CH_PORT\", \"18123\"))\nCH_USER = os.environ.get(\"CH_USER\", \"dbt\")\nCH_PASSWORD = os.environ.get(\"CH_DBT_PASSWORD\") or os.environ.get(\"password\", \"\")\nKAFKA_CONSUMER_GROUP = os.environ.get(\"CH_RAW_CONSUMER_GROUP\", \"ch-raw-colaborador-v2\")\nMAX_LAG_MESSAGES = int(os.environ.get(\"FRESHNESS_MAX_LAG\", \"100\"))\n\ndbt_project = DbtProject(\n    project_dir=DBT_PROJECT_DIR,\n    profiles_dir=DBT_PROJECT_DIR,\n)\n\ndbt_project.prepare_if_dev()\n\n\ndef _ch_client():\n    return clickhouse_connect.get_client(\n        host=CH_HOST,\n        port=CH_PORT,\n        username=CH_USER,\n        password=CH_PASSWORD,\n        secure=False,\n    )\n\n\ndef _kafka_lag() -> int:\n    client = _ch_client()\n    try:\n        result = client.query(\n            \"\"\"\n            SELECT coalesce(\n                sum(greatest(\n                    toInt64(0),\n                    toInt64(coalesce(assignments.current_offset[1], 0))\n                    - toInt64(coalesce(num_messages_read, 0))\n                )),\n                0\n            ) AS lag\n            FROM system.kafka_consumers\n            WHERE table = 'colaborador_kafka'\n            \"\"\"\n        )\n        return max(0, int(result.first_row[0] or 0))\n    except Exception:\n        return 0\n\n\ndef _raw_watermark(entity: str) -> int:\n    client = _ch_client()\n    result = client.query(f\"SELECT coalesce(max(_ts_ms), 0) FROM raw.{entity}\")\n    return int(result.first_row[0] or 0)\n\n\n@dbt_assets(manifest=dbt_project.manifest_path)\ndef mereo_dbt_assets(context: AssetExecutionContext, dbt: DbtCliResource):\n    yield from dbt.cli([\"build\"], context=context).stream()\n\n\ndbt_build_job = define_asset_job(name=\"dbt_build\", selection=[mereo_dbt_assets])\n\ndaily_dbt_schedule = ScheduleDefinition(\n    job=dbt_build_job,\n    cron_schedule=\"0 6 * * *\",\n    name=\"daily_dbt_build\",\n    default_status=DefaultScheduleStatus.STOPPED,\n)\n\n\n@sensor(job=dbt_build_job, minimum_interval_seconds=120, default_status=DefaultSensorStatus.RUNNING)\ndef raw_freshness_sensor(context: SensorEvaluationContext):\n    try:\n        lag = _kafka_lag()\n        watermark = _raw_watermark(PILOT_ENTITY)\n    except Exception as exc:\n        context.log.warning(\"Freshness check failed: %s\", exc)\n        return\n\n    if lag > MAX_LAG_MESSAGES:\n        context.log.info(\"dbt blocked: CH Kafka lag=%s > %s\", lag, MAX_LAG_MESSAGES)\n        try:\n            client = _ch_client()\n            client.insert(\n                \"pipeline.freshness_events\",\n                [[PILOT_ENTITY, 1, f\"lag={lag}\", None]],\n                column_names=[\"entity\", \"dbt_blocked\", \"reason\", \"at\"],\n            )\n        except Exception:\n            pass\n        return\n\n    if watermark == 0:\n        context.log.info(\"dbt blocked: raw.%s watermark=0\", PILOT_ENTITY)\n        return\n\n    context.log.info(\"Freshness OK lag=%s watermark=%s \u2014 triggering dbt_build\", lag, watermark)\n    yield RunRequest(run_key=f\"fresh-{PILOT_ENTITY}-{watermark}\")\n\n\ndefs = Definitions(\n    assets=[mereo_dbt_assets],\n    jobs=[dbt_build_job],\n    resources={\n  \
    \      \"dbt\": DbtCliResource(\n            project_dir=dbt_project,\n            profiles_dir=DBT_PROJECT_DIR,\n            dbt_executable=str(DBT_EXECUTABLE) if DBT_EXECUTABLE.exists() else \"dbt\",\n            target=os.environ.get(\"DBT_TARGET\", \"dev\"),\n        ),\n    },\n    schedules=[daily_dbt_schedule],\n    sensors=[raw_freshness_sensor],\n)\n"
  k8s-client-auth-fix.py: "# kubernetes-client 36.x: load_incluster_config grava api_key[\"authorization\"],\n# mas auth_settings() s\xF3 l\xEA api_key[\"BearerToken\"] \u2014 requests saem como system:anonymous.\nfrom kubernetes.client.configuration import Configuration\n\n_orig_auth_settings = Configuration.auth_settings\n\n\ndef _patched_auth_settings(self):\n    if \"authorization\" in self.api_key and \"BearerToken\" not in self.api_key:\n        self.api_key[\"BearerToken\"] = self.api_key[\"authorization\"]\n    return _orig_auth_settings(self)\n\n\nConfiguration.auth_settings = _patched_auth_settings\n"
  run-worker-entrypoint.sh: "#!/usr/bin/env bash\n# Entrypoint dos run jobs K8s: deps + workspace + exec do comando Dagster (execute_run).\nset -euo pipefail\n\nif ! command -v dagster >/dev/null 2>&1; then\n  pip install --quiet \\\n    \"dagster>=1.9\" \"dagster-dbt>=0.25\" \"dagster-postgres>=0.25\" \"dagster-k8s>=0.25\" \\\n    \"dbt-core>=1.9\" \"dbt-clickhouse>=1.8\" \"clickhouse-connect>=0.8\"\nfi\n\nexport CH_DBT_PASSWORD=\"${CH_DBT_PASSWORD:-${password:-}}\"\n\nif [[ -f /config/dagster/sync-workspace.sh ]]; then\n  # shellcheck disable=SC1091\n  source /config/dagster/sync-workspace.sh\nfi\n\nexec \"$@\"\n"
  start.sh: "#!/usr/bin/env bash\nset -euo pipefail\n\npip install --quiet \\\n  \"dagster>=1.9\" \"dagster-dbt>=0.25\" \"dbt-core>=1.9\" \"dbt-clickhouse>=1.8\" \"clickhouse-connect>=0.8\"\n\n# shellcheck disable=SC1091\nsource /config/dagster/sync-workspace.sh\n\nexec dagster api grpc \\\n  -h 0.0.0.0 -p 3030 \\\n  -m mereo_analytics.definitions \\\n  --working-directory /opt/dagster/app\n"
  sync-workspace.sh: "#!/usr/bin/env bash\n# Sincroniza ConfigMaps \u2192 /opt/dagster (user-code pod e run jobs).\nset -euo pipefail\n\nmkdir -p /opt/dagster/dbt/models/staging /opt/dagster/dbt/models/gold\ncp /config/dbt/dbt_project.yml /config/dbt/packages.yml /opt/dagster/dbt/\ncp /config/dbt/profiles.yml /opt/dagster/dbt/profiles.yml\n\nfor f in /config/models/*; do\n  [ -f \"$f\" ] || continue\n  key=$(basename \"$f\")\n  rel=\"${key//__//}\"\n  mkdir -p \"/opt/dagster/dbt/models/$(dirname \"$rel\")\"\n  cp \"$f\" \"/opt/dagster/dbt/models/$rel\"\ndone\n\nmkdir -p /opt/dagster/app/mereo_analytics\ncp /config/dagster/definitions.py /config/dagster/__init__.py /opt/dagster/app/mereo_analytics/\n\nexport DBT_PROJECT_DIR=/opt/dagster/dbt\nexport DBT_PROFILES_DIR=/opt/dagster/dbt\nexport DBT_TARGET=\"${DBT_TARGET:-k8s}\"\nexport DBT_EXECUTABLE=\"${DBT_EXECUTABLE:-dbt}\"\nexport PYTHONPATH=/opt/dagster/app\n\ncd /opt/dagster/dbt && dbt deps && dbt parse --profiles-dir .\n"
kind: ConfigMap
metadata:
  name: mereo-dagster-code
  namespace: mereo-analytics
