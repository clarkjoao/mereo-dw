apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: mereo-kafka
  namespace: mereo-kafka
spec:
  entityOperator:
    topicOperator: {}
    userOperator: {}
  kafka:
    config:
      auto.create.topics.enable: true
      default.replication.factor: 1
      inter.broker.protocol.version: '3.7'
      log.retention.bytes: 10737418240
      log.retention.hours: 168
      log.segment.bytes: 536870912
      min.insync.replicas: 1
      offsets.topic.replication.factor: 1
      transaction.state.log.min.isr: 1
      transaction.state.log.replication.factor: 1
    jvmOptions:
      -Xms: 1024m
      -Xmx: 2048m
    listeners:
    - name: plain
      port: 9092
      tls: false
      type: internal
    replicas: 1
    resources:
      limits:
        cpu: '1'
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 2Gi
    storage:
      deleteClaim: false
      size: 20Gi
      type: persistent-claim
    version: 3.7.1
  zookeeper:
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 512Mi
    storage:
      deleteClaim: false
      size: 5Gi
      type: persistent-claim
