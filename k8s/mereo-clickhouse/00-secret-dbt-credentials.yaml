# ============================================================================
# Secret: clickhouse-dbt-credentials
# ============================================================================
# Senha do usuário `dbt` no ClickHouse. Esse usuário é provisionado por um
# init.sql separado (ver init container do ClickHouseInstallation ou
# configuração custom no operator) e é consumido por:
#
#   - mereo-analytics/mereo-analytics-code  (gRPC server do Dagster, executa dbt)
#   - mereo-analytics/dbt-run-* (jobs K8s lançados pelo K8sRunLauncher)
#   - dbt local CLI quando alguém executa `dbt run` da própria estação
#
# O MESMO Secret é replicado nos namespaces `mereo-analytics` e
# `mereo-clickhouse` para evitar cross-namespace secret refs (não permitido).
# Mantenha as duas cópias sincronizadas.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-dbt-credentials
  namespace: mereo-clickhouse
type: Opaque
data:
