# ============================================================================
# Ingress: clickhouse-play
# ============================================================================
# Expõe a UI do ClickHouse Play (interface HTTP em 8123) via Traefik para
# `http://clickhouse.mereo.local`. O service alvo é o `clickhouse-mereo-clickhouse`
# (gerado pelo Altinity Operator a partir do ClickHouseInstallation),
# que faz load balance interno entre os pods do cluster.
#
# Para acesso local:
#   adicionar em /etc/hosts:
#     151.244.141.115  clickhouse.mereo.local
#
# IMPORTANTE: não tem autenticação no Ingress — qualquer um na rede local
# que resolva clickhouse.mereo.local cai direto no ClickHouse. Em prod,
# adicionar middleware Traefik com basic-auth ou OAuth2 proxy.
# ----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clickhouse-play
  namespace: mereo-clickhouse
  labels:
    app.kubernetes.io/part-of: mereo-poc
spec:
  ingressClassName: traefik
  rules:
    - host: clickhouse.mereo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clickhouse-mereo-clickhouse  # service do CR ClickHouseInstallation
                port:
                  number: 8123                     # HTTP nativo do ClickHouse
