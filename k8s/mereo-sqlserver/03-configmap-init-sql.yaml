# ============================================================================
# ConfigMap: mssql-init-sql
# ============================================================================
# Scripts SQL de bootstrap, executados em ordem pelo Job `mssql-init` via
# sqlcmd. Eles preparam o estado mínimo que o Debezium SqlServerConnector
# espera encontrar para iniciar o snapshot inicial.
#
# Ordem de execução (alfabética por nome de arquivo):
#   01-create-databases.sql  → cria os 3 bancos piloto (multi-tenant)
#   02-create-colaborador.sql → cria dbo.COLABORADOR em cada banco (schema
#                               alinhado a analytics/catalog/entities/colaborador.yaml)
#   03-seed-data.sql          → noop (dados via mereo_tools seed-sim)
#   04-enable-cdc.sql         → habilita CDC (sp_cdc_enable_db + sp_cdc_enable_table)
#
# Todos os scripts são idempotentes (IF NOT EXISTS, OBJECT_ID, is_cdc_enabled)
# para sobreviver a reexecuções do Job.
#
# ATENÇÃO: kubectl tem limite de ~1 MiB por ConfigMap. Se adicionar mais
# tabelas, considere quebrar em múltiplos ConfigMaps ou montar via volume.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: mssql-init-sql
  namespace: mereo-sqlserver
data:
  01-create-databases.sql: |
    -- Bancos piloto simulados (nomes idênticos ao prod)
    IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'MereoGR-Afya')
        CREATE DATABASE [MereoGR-Afya];
    GO

    IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'MereoGR-Staging')
        CREATE DATABASE [MereoGR-Staging];
    GO

    IF NOT EXISTS (SELECT 1 FROM sys.databases WHERE name = N'MereoGR-Allos')
        CREATE DATABASE [MereoGR-Allos];
    GO

  02-create-colaborador.sql: |
    -- dbo.COLABORADOR — schema alinhado ao contrato analytics/catalog/entities/colaborador.yaml
    -- Repete o mesmo DDL em cada banco (Afya/Staging/Allos) para garantir isolamento por tenant.

    USE [MereoGR-Afya];
    GO
    IF OBJECT_ID(N'dbo.COLABORADOR', N'U') IS NULL
    CREATE TABLE dbo.COLABORADOR (
        ID                              INT             NOT NULL,
        ID_GRUPO_USUARIO                INT             NULL,
        ID_IDIOMA                       INT             NULL,
        USER_LOGIN                      NVARCHAR(128)   NULL,
        NOME                            NVARCHAR(256)   NULL,
        EMAIL                           NVARCHAR(256)   NULL,
        WORKFLOW_ACOES                  NVARCHAR(MAX)   NULL,
        ATIVO                           BIT             NOT NULL CONSTRAINT DF_COLABORADOR_ATIVO DEFAULT (1),
        FOTO_PATH                       NVARCHAR(512)   NULL,
        USUARIO_AD                      BIT             NULL,
        TIPO_COLABORADOR                INT             NULL,
        EXIBIR_TUTORIAL                 BIT             NULL,
        Registration                    UNIQUEIDENTIFIER NULL,
        EXIBIR_TUTORIAL_DASH_PERFORMANCE BIT            NULL,
        FCMToken                        NVARCHAR(512)   NULL,
        AvailabilityRelocateStatus      INT             NULL,
        SignatureConsentAgreement       BIT             NULL,
        Locality_Id                     INT             NULL,
        CONSTRAINT PK_COLABORADOR PRIMARY KEY CLUSTERED (ID)
    );
    GO

    USE [MereoGR-Staging];
    GO
    IF OBJECT_ID(N'dbo.COLABORADOR', N'U') IS NULL
    CREATE TABLE dbo.COLABORADOR (
        ID                              INT             NOT NULL,
        ID_GRUPO_USUARIO                INT             NULL,
        ID_IDIOMA                       INT             NULL,
        USER_LOGIN                      NVARCHAR(128)   NULL,
        NOME                            NVARCHAR(256)   NULL,
        EMAIL                           NVARCHAR(256)   NULL,
        WORKFLOW_ACOES                  NVARCHAR(MAX)   NULL,
        ATIVO                           BIT             NOT NULL CONSTRAINT DF_COLABORADOR_ATIVO DEFAULT (1),
        FOTO_PATH                       NVARCHAR(512)   NULL,
        USUARIO_AD                      BIT             NULL,
        TIPO_COLABORADOR                INT             NULL,
        EXIBIR_TUTORIAL                 BIT             NULL,
        Registration                    UNIQUEIDENTIFIER NULL,
        EXIBIR_TUTORIAL_DASH_PERFORMANCE BIT            NULL,
        FCMToken                        NVARCHAR(512)   NULL,
        AvailabilityRelocateStatus      INT             NULL,
        SignatureConsentAgreement       BIT             NULL,
        Locality_Id                     INT             NULL,
        CONSTRAINT PK_COLABORADOR PRIMARY KEY CLUSTERED (ID)
    );
    GO

    USE [MereoGR-Allos];
    GO
    IF OBJECT_ID(N'dbo.COLABORADOR', N'U') IS NULL
    CREATE TABLE dbo.COLABORADOR (
        ID                              INT             NOT NULL,
        ID_GRUPO_USUARIO                INT             NULL,
        ID_IDIOMA                       INT             NULL,
        USER_LOGIN                      NVARCHAR(128)   NULL,
        NOME                            NVARCHAR(256)   NULL,
        EMAIL                           NVARCHAR(256)   NULL,
        WORKFLOW_ACOES                  NVARCHAR(MAX)   NULL,
        ATIVO                           BIT             NOT NULL CONSTRAINT DF_COLABORADOR_ATIVO DEFAULT (1),
        FOTO_PATH                       NVARCHAR(512)   NULL,
        USUARIO_AD                      BIT             NULL,
        TIPO_COLABORADOR                INT             NULL,
        EXIBIR_TUTORIAL                 BIT             NULL,
        Registration                    UNIQUEIDENTIFIER NULL,
        EXIBIR_TUTORIAL_DASH_PERFORMANCE BIT            NULL,
        FCMToken                        NVARCHAR(512)   NULL,
        AvailabilityRelocateStatus      INT             NULL,
        SignatureConsentAgreement       BIT             NULL,
        Locality_Id                     INT             NULL,
        CONSTRAINT PK_COLABORADOR PRIMARY KEY CLUSTERED (ID)
    );
    GO

  03-seed-data.sql: |
    -- Dados vêm de prod via: uv run python -m mereo_tools seed-sim --limit 1000
    SELECT 1;
    GO

  04-enable-cdc.sql: |
    -- Habilita CDC nos 3 bancos piloto. Pré-requisitos:
    --   * SQL Server Agent ativo (env MSSQL_AGENT_ENABLED=true no StatefulSet).
    --   * Edition que suporta CDC (Developer/Standard/Enterprise — não Express).
    -- Idempotente: checa is_cdc_enabled e cdc.change_tables antes de habilitar.

    USE [MereoGR-Afya];
    GO
    IF (SELECT is_cdc_enabled FROM sys.databases WHERE name = N'MereoGR-Afya') = 0
        EXEC sys.sp_cdc_enable_db;
    GO
    IF NOT EXISTS (
        SELECT 1 FROM cdc.change_tables
        WHERE source_object_id = OBJECT_ID(N'dbo.COLABORADOR')
    )
        EXEC sys.sp_cdc_enable_table
            @source_schema = N'dbo',
            @source_name   = N'COLABORADOR',
            @role_name     = NULL,
            @supports_net_changes = 1;
    GO

    USE [MereoGR-Staging];
    GO
    IF (SELECT is_cdc_enabled FROM sys.databases WHERE name = N'MereoGR-Staging') = 0
        EXEC sys.sp_cdc_enable_db;
    GO
    IF NOT EXISTS (
        SELECT 1 FROM cdc.change_tables
        WHERE source_object_id = OBJECT_ID(N'dbo.COLABORADOR')
    )
        EXEC sys.sp_cdc_enable_table
            @source_schema = N'dbo',
            @source_name   = N'COLABORADOR',
            @role_name     = NULL,
            @supports_net_changes = 1;
    GO

    USE [MereoGR-Allos];
    GO
    IF (SELECT is_cdc_enabled FROM sys.databases WHERE name = N'MereoGR-Allos') = 0
        EXEC sys.sp_cdc_enable_db;
    GO
    IF NOT EXISTS (
        SELECT 1 FROM cdc.change_tables
        WHERE source_object_id = OBJECT_ID(N'dbo.COLABORADOR')
    )
        EXEC sys.sp_cdc_enable_table
            @source_schema = N'dbo',
            @source_name   = N'COLABORADOR',
            @role_name     = NULL,
            @supports_net_changes = 1;
    GO
