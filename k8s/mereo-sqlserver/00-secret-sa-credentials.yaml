# ============================================================================
# Secret: credenciais SA do SQL Server
# ============================================================================
# Senha do usuário `sa` (system administrator). Usada pelo:
#   - StatefulSet `mssql` (env MSSQL_SA_PASSWORD) na inicialização do contêiner.
#   - Job `mssql-init` para conectar via sqlcmd e rodar os scripts de bootstrap.
#   - Secret espelhado em `mereo-kafka/mssql-debezium-creds` para o Debezium.
#
# Em ambientes reais, substituir por integração com cofre (External Secrets
# Operator, Vault, SOPS, AWS/Azure KMS). Aqui é PoC — valor é base64 simples.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mssql-sa-credentials
  namespace: mereo-sqlserver
type: Opaque
data:
  # MereoSim2026! (decodifica via: echo "..." | base64 -d)
  SA_PASSWORD: TWVyZW9TaW0yMDI2IQ==
