# ============================================================================
# Namespaces da plataforma Mereo
# ============================================================================
# Topologia simplificada em 2 namespaces:
#
#   mereo-sqlserver  →  Banco de produção SIMULADO (fonte CDC).
#                       Apartado para representar um sistema "externo" ao
#                       resto da plataforma — em produção, este namespace
#                       NÃO existiria: o SQL Server seria um servidor fora
#                       do cluster (RDS, Azure SQL, on-prem) acessado via
#                       endpoint estável.
#
#   mereo            →  Plataforma Mereo unificada. Concentra todas as peças
#                       de transporte + warehouse + orquestração:
#                         • Kafka + ZooKeeper + Kafka Connect (Strimzi)
#                         • ClickHouse (Altinity)
#                         • Dagster (webserver, daemon, user-code) + Postgres
#                         • dbt project (em ConfigMap)
#                         • Ingresses (clickhouse.mereo.local, dagster.mereo.local)
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: mereo-sqlserver
  labels:
    app.kubernetes.io/part-of: mereo
    role: external-source     # marca que este NS imita um sistema externo
---
apiVersion: v1
kind: Namespace
metadata:
  name: mereo
  labels:
    app.kubernetes.io/part-of: mereo
    role: platform
