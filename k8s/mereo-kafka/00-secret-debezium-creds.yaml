# ============================================================================
# Secret: mssql-debezium-creds
# ============================================================================
# Credenciais que o Debezium SqlServerConnector usa para conectar no SQL Server.
# Não é referenciado por env var direta — o Strimzi monta este Secret como
# volume em `/opt/kafka/external-configuration/mssql-creds/` no pod do Kafka
# Connect, e cada KafkaConnector lê as chaves via FileConfigProvider:
#
#   database.hostname = ${file:.../debezium.properties:database.hostname}
#
# Esse padrão evita expor a senha em texto puro dentro do KafkaConnector CR.
# A chave única `debezium.properties` é um arquivo .properties multilinha:
#
#   database.hostname=mssql.mereo-sqlserver.svc.cluster.local
#   database.port=1433
#   database.user=sa
#   database.password=MereoSim2026!
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mssql-debezium-creds
  namespace: mereo-kafka
type: Opaque
data:
  # Conteúdo decodificado:
  #   database.hostname=mssql.mereo-sqlserver.svc.cluster.local
  #   database.port=1433
  #   database.user=sa
  #   database.password=MereoSim2026!
  debezium.properties: ZGF0YWJhc2UuaG9zdG5hbWU9bXNzcWwubWVyZW8tc3Fsc2VydmVyLnN2Yy5jbHVzdGVyLmxvY2FsCmRhdGFiYXNlLnBvcnQ9MTQzMwpkYXRhYmFzZS51c2VyPXNhCmRhdGFiYXNlLnBhc3N3b3JkPU1lcmVvU2ltMjAyNiE=
