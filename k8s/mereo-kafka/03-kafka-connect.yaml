# ============================================================================
# KafkaConnect cluster (kafka.strimzi.io)
# ============================================================================
# Cluster Kafka Connect que hospeda os connectors Debezium. O CR é
# reconciliado pelo Strimzi, gerando: StatefulSet `mereo-connect-connect`,
# Service `mereo-connect-connect-api`, Service `mereo-connect-connect`, etc.
#
# Annotation chave:
#   strimzi.io/use-connector-resources: "true"
#   → diz ao Strimzi Connect Operator para reconciliar KafkaConnector CRs
#     (em vez de exigir POST direto na REST API /connectors). Os 3
#     SqlServerConnector estão em 04-kafka-connectors.yaml.
#
# Imagem customizada:
#   `cdc-poc/kafka-connect-debezium:2.7.3.Final-kafka3.7.1` é uma imagem
#   construída localmente que estende `quay.io/strimzi/kafka:0.41-kafka-3.7.1`
#   adicionando os plugins Debezium SqlServer + transforms. Em prod, publicar
#   essa imagem em registry privado e referenciar com tag versionada.
#
# externalConfiguration:
#   Monta o Secret `mssql-debezium-creds` como volume em
#   `/opt/kafka/external-configuration/mssql-creds/`. Os KafkaConnectors
#   referenciam essas chaves via FileConfigProvider (sem expor senha no CR).
# ----------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnect
metadata:
  name: mereo-connect
  namespace: mereo-kafka
  annotations:
    strimzi.io/use-connector-resources: "true"
spec:
  version: 3.7.1
  replicas: 1
  bootstrapServers: mereo-kafka-kafka-bootstrap.mereo-kafka:9092
  image: cdc-poc/kafka-connect-debezium:2.7.3.Final-kafka3.7.1
  config:
    group.id: mereo-connect-cluster

    # Tópicos internos do Connect (criados automaticamente). RF=1 porque
    # o cluster tem 1 broker. Em prod, replication.factor ≥ 3.
    config.storage.topic: mereo-connect-configs
    offset.storage.topic: mereo-connect-offsets
    status.storage.topic: mereo-connect-status
    config.storage.replication.factor: 1
    offset.storage.replication.factor: 1
    status.storage.replication.factor: 1

    # Converters padrão JSON sem schema embutido (schemas.enable=false).
    # O ClickHouse Kafka engine consome com kafka_format=JSONEachRow.
    key.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: false
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: false

    # Habilita FileConfigProvider para os connectors lerem chaves do volume
    # montado a partir do Secret mssql-debezium-creds (ver externalConfiguration).
    config.providers: file
    config.providers.file.class: org.apache.kafka.common.config.provider.FileConfigProvider

  externalConfiguration:
    volumes:
      - name: mssql-creds
        secret:
          secretName: mssql-debezium-creds

  jvmOptions:
    -Xms: 512m
    -Xmx: 1024m
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi
