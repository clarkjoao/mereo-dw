# ============================================================================
# Kafka cluster (Strimzi CR: kafkas.kafka.strimzi.io)
# ============================================================================
# Define o cluster Kafka completo: brokers + ZooKeeper + entity-operator (que
# reconcilia KafkaTopic/KafkaUser CRs).
#
# Pré-requisito: o Strimzi Cluster Operator precisa estar instalado em algum
# namespace do cluster (geralmente kafka-operator). Sem ele, este CR não gera
# StatefulSets/Services/etc.
#
# Topologia atual (PoC):
#   - 1 broker Kafka (versão 3.7.1, KafkaListeners plain/9092 sem TLS).
#   - 1 ZooKeeper (deprecated em versões futuras → migrar pra KRaft eventualmente).
#   - replication.factor = 1 em todos os tópicos internos → NÃO USAR EM PROD.
#
# Recursos do Strimzi gerados a partir deste CR (não precisam ser declarados):
#   StatefulSet/mereo-kafka-kafka, StatefulSet/mereo-kafka-zookeeper,
#   Deployment/mereo-kafka-entity-operator, Services bootstrap/brokers/zk,
#   Secrets de TLS (mereo-kafka-cluster-ca, etc), NetworkPolicies, PVCs.
# ----------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: mereo-kafka
  namespace: mereo-kafka
spec:
  kafka:
    version: 3.7.1
    replicas: 1
    listeners:
      - name: plain     # listener interno sem TLS — só p/ tráfego in-cluster
        port: 9092
        type: internal
        tls: false
    config:
      # Replicação dos tópicos internos do Kafka (offsets, transactions) — 1
      # porque só temos 1 broker. Em prod deve ser ≥ 3 com min.insync.replicas=2.
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.7"

      # Auto-create habilitado para o ClickHouse criar tópicos consumer de
      # status/lag conforme necessário. Em prod, desabilite e crie via CR.
      auto.create.topics.enable: true

      # Retenção: 7 dias OU 10 GiB (o que vier primeiro). Adequado para o
      # tópico `raw.colaborador`, que é consumido por uma MV do ClickHouse.
      log.retention.hours: 168
      log.retention.bytes: 10737418240
      log.segment.bytes: 536870912
    jvmOptions:
      -Xms: 1024m
      -Xmx: 2048m
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 4Gi
    storage:
      type: persistent-claim
      size: 20Gi
      deleteClaim: false  # mantém o PVC se o CR for deletado (proteção de dados)

  zookeeper:
    replicas: 1
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  entityOperator:
    # Operadores que reconciliam recursos no namespace:
    topicOperator: {}   # observa KafkaTopic CRs → cria/altera tópicos
    userOperator: {}    # observa KafkaUser CRs (não usamos ainda)
