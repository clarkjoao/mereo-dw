# ============================================================================
# KafkaTopic CRs (kafka.strimzi.io)
# ============================================================================
# Definição declarativa dos tópicos do pipeline. O Topic Operator do Strimzi
# (entityOperator/topicOperator no Kafka CR) cria/altera o tópico no broker
# correspondente sempre que esses CRs mudam.
#
# Tópicos do pipeline:
#   - mereogr.schema-history  → histórico de schema do Debezium
#     (interno; NÃO ler/produzir manualmente). retention=-1 = nunca expira.
#   - raw.colaborador         → tópico de evento unificado para a entidade
#     COLABORADOR de TODOS os tenants. Cada Debezium connector roteia
#     `mereogr-<tenant>.<db>.dbo.COLABORADOR` → `raw.colaborador` via SMT
#     ByLogicalTableRouter, adicionando o campo `tenant_slug`.
#
# Layout multi-tenant: 6 partições em raw.colaborador permitem paralelismo no
# consumer ClickHouse. A chave da mensagem é o PK (`ID`), então rows com mesmo
# tenant+ID caem sempre na mesma partição → ordem preservada por entidade.
# ----------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: mereogr.schema-history
  namespace: mereo-kafka
  labels:
    strimzi.io/cluster: mereo-kafka  # vincula ao Kafka CR pelo nome
spec:
  partitions: 1            # tópico interno do Debezium — não precisa paralelismo
  replicas: 1
  config:
    cleanup.policy: delete
    retention.ms: -1       # -1 = retenção infinita; o Debezium reescreve o schema
    segment.bytes: 33554432
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: raw.colaborador
  namespace: mereo-kafka
  labels:
    strimzi.io/cluster: mereo-kafka
spec:
  partitions: 6            # paralelismo para o consumer do ClickHouse
  replicas: 1
  config:
    cleanup.policy: delete
    retention.ms: 604800000  # 7 dias — mensagens já consumidas podem expirar
