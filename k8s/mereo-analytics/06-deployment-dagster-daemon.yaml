# ============================================================================
# Deployment: mereo-dagster-daemon (Dagster background daemon)
# ============================================================================
# O daemon é o "motor" do Dagster: roda schedules, sensors, run queue e
# o run launcher. Ele é quem CRIA os Kubernetes Jobs de cada run via
# K8sRunLauncher (ver mereo-dagster-instance ConfigMap).
#
# Imagem oficial `dagster/dagster-celery-k8s:1.13.6` — apesar do nome
# "celery", aqui ela é usada apenas porque traz os pacotes
# `dagster-k8s` + `dagster-postgres` + `dagster` numa única imagem.
#
# strategy: Recreate — daemon SINGLETON. Evita 2 daemons concorrendo pela
# fila/sensores. Não pode haver overlap durante rollout.
#
# initContainer: aguarda Postgres ficar pronto (pg_isready) com loop infinito.
# Em prod, considere `restartPolicy: OnFailure` + maxRetries para evitar
# pod travado.
#
# Mount peculiar: `sitecustomize.py` é montado via `subPath:k8s-client-auth-fix.py`
# para corrigir bug do kubernetes-client (ver comentário no ConfigMap
# mereo-dagster-code). Esse arquivo executa AUTOMATICAMENTE no startup do
# interpretador Python e patcheia a config de autenticação.
# ----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mereo-dagster-daemon
  namespace: mereo-analytics
  labels:
    app.kubernetes.io/name: dagster
    component: dagster-daemon
spec:
  replicas: 1
  strategy:
    type: Recreate     # daemon é singleton; nunca rodar 2 simultaneamente
  selector:
    matchLabels:
      app.kubernetes.io/name: dagster
      component: dagster-daemon
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dagster
        component: dagster-daemon
    spec:
      serviceAccountName: mereo-dagster
      automountServiceAccountToken: true   # daemon precisa do token p/ criar Jobs
      initContainers:
        - name: check-db-ready
          image: docker.io/library/postgres:14.6
          command:
            - sh
            - -c
            - until pg_isready -h mereo-dagster-postgresql -p 5432 -U test; do echo waiting for database; sleep 2; done;
      containers:
        - name: dagster
          image: docker.io/dagster/dagster-celery-k8s:1.13.6
          imagePullPolicy: Always   # pega versão mais recente do tag
          command:
            - /bin/bash
            - -c
            - dagster-daemon run -w /dagster-workspace/workspace.yaml
          env:
            - name: DAGSTER_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagster-postgresql-secret
                  key: postgresql-password
            - name: DAGSTER_DAEMON_HEARTBEAT_TOLERANCE
              value: "1800"   # 30min sem heartbeat antes do daemon ser marcado dead
          envFrom:
            - configMapRef:
                name: mereo-dagster-daemon-env
          volumeMounts:
            - name: dagster-instance
              mountPath: /opt/dagster/dagster_home/dagster.yaml
              subPath: dagster.yaml
            - name: dagster-workspace-yaml
              mountPath: /dagster-workspace/
            - name: dagster-code
              mountPath: /config/dagster
            - name: dagster-code
              mountPath: /usr/local/lib/python3.10/site-packages/sitecustomize.py
              subPath: k8s-client-auth-fix.py   # patch para kubernetes-client 36.x
      volumes:
        - name: dagster-instance
          configMap:
            name: mereo-dagster-instance
        - name: dagster-workspace-yaml
          configMap:
            name: mereo-dagster-workspace-yaml
        - name: dagster-code
          configMap:
            name: mereo-dagster-code
            defaultMode: 493
