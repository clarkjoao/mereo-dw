# ============================================================================
# Secrets do namespace mereo-analytics
# ============================================================================
# 3 secrets:
#
#   dagster-postgresql-secret    → senha que os apps Dagster usam para
#                                  conectar no Postgres (envVar DAGSTER_PG_PASSWORD).
#                                  Chave: postgresql-password.
#
#   mereo-dagster-postgresql     → senha que o pod Postgres usa pra subir o
#                                  banco (envVar POSTGRES_PASSWORD). Chave:
#                                  postgresql-password. NA PRÁTICA é a MESMA
#                                  senha — duas cópias por convenção do chart
#                                  bitnami/postgresql.
#
#   clickhouse-dbt-credentials   → cópia do Secret de mesmo nome do namespace
#                                  mereo-clickhouse. O dbt (rodando aqui) usa
#                                  como CH_DBT_PASSWORD para conectar via HTTP
#                                  no ClickHouse.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: dagster-postgresql-secret
  namespace: mereo-analytics
type: Opaque
data:
  # test  (PoC — substituir por valor random em prod)
  postgresql-password: dGVzdA==
---
apiVersion: v1
kind: Secret
metadata:
  name: mereo-dagster-postgresql
  namespace: mereo-analytics
type: Opaque
data:
  postgresql-password: dGVzdA==
---
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-dbt-credentials
  namespace: mereo-analytics
type: Opaque
data:
  # Piv96gq7Sb1roe2nQuEdEQ
  password: UGl2OTZncTdTYjFyb2UyblF1RWRFUQ==
