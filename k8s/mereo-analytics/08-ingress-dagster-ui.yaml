# ============================================================================
# Ingress: dagster-ui
# ============================================================================
# Expõe o webserver do Dagster via Traefik em `http://dagster.mereo.local`.
# Adicionar em /etc/hosts:
#   151.244.141.115  dagster.mereo.local
#
# Mesma ausência de auth do `clickhouse-play`: PoC. Em prod usar middleware
# Traefik (basic-auth, forward-auth para OAuth2 proxy, ou Hub IDP).
# ----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dagster-ui
  namespace: mereo-analytics
  labels:
    app.kubernetes.io/part-of: mereo-analytics
spec:
  ingressClassName: traefik
  rules:
    - host: dagster.mereo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mereo-dagster-dagster-webserver
                port:
                  number: 80
