# ============================================================================
# RBAC para o Dagster (ServiceAccount + Role + RoleBinding)
# ============================================================================
# O `dagster-daemon` usa o K8sRunLauncher: cada run do Dagster vira um Kubernetes
# Job no namespace `mereo-analytics`. Para conseguir criar/observar/cancelar
# esses jobs, o pod do daemon precisa de permissões — daí esta Role.
#
# Princípio do menor privilégio: limita ao namespace e a 2 grupos
# (`batch` para Jobs e `""` para Pods/Events/Logs). Sem acesso a Secrets ou a
# outros namespaces.
#
# automountServiceAccountToken: false na SA → cada pod que QUER o token monta
# manualmente via automountServiceAccountToken: true no template do Deployment
# (daemon e webserver fazem isso). Os pods de run job montam token pelo
# K8sRunLauncher (load_incluster_config: true).
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mereo-dagster
  namespace: mereo-analytics
automountServiceAccountToken: false   # apps opt-in via template do pod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mereo-dagster-role
  namespace: mereo-analytics
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, deletecollection, get, list, patch, update, watch]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: [create, delete, deletecollection, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mereo-dagster-rolebinding
  namespace: mereo-analytics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mereo-dagster-role
subjects:
  - kind: ServiceAccount
    name: mereo-dagster
