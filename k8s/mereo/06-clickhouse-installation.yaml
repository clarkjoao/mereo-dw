# ============================================================================
# ClickHouseInstallation (Altinity Operator)
# ============================================================================
# Cluster ClickHouse single-node (PoC). Pré-requisito: Altinity ClickHouse
# Operator instalado (geralmente em clickhouse-operator-system).
#
# Recursos GERADOS pelo operator a partir deste CR:
#   StatefulSet/chi-mereo-clickhouse-main-0-0
#   Service/chi-mereo-clickhouse-main-0-0       (headless, por pod)
#   Service/clickhouse-mereo-clickhouse         (LB interno → alvo do dbt)
#   ConfigMaps chi-mereo-clickhouse-common-*    (configd/usersd)
#   PVC ch-data-chi-mereo-clickhouse-main-0-0-0
#
# Política de usuários:
#   default → networks/ip = ::/0 (acesso de qualquer pod do cluster).
#   O usuário `dbt` é criado via users.xml gerenciado pelo operator (não está
#   neste manifest). A senha hash precisa bater com clickhouse-dbt-credentials.
# ----------------------------------------------------------------------------
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: mereo-clickhouse
  namespace: mereo
spec:
  configuration:
    clusters:
      - name: main
        layout:
          shardsCount: 1
          replicasCount: 1
    users:
      default/networks/ip:
        - ::/0          # PoC; em prod restrinja ao CIDR dos pods do dbt
      default/profile: default
      default/quota: default

  defaults:
    templates:
      podTemplate: ch-pod
      dataVolumeClaimTemplate: ch-data

  templates:
    podTemplates:
      - name: ch-pod
        spec:
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:24.3
              ports:
                - name: http
                  containerPort: 8123
                - name: tcp
                  containerPort: 9000
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi

    volumeClaimTemplates:
      - name: ch-data
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
