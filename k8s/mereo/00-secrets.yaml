# ============================================================================
# Secrets do namespace mereo
# ============================================================================
# 3 secrets, agora cada um em UMA cópia única (antes havia duplicação
# cross-namespace de clickhouse-dbt-credentials e dagster-postgresql):
#
#   dagster-postgresql       → senha do Postgres interno do Dagster (envia
#                              tanto para o pod do banco como para os apps
#                              clientes via DAGSTER_PG_PASSWORD).
#                              Chave: postgresql-password.
#
#   clickhouse-dbt-credentials → senha do usuário `dbt` no ClickHouse.
#                              Lida por todos os componentes que executam dbt
#                              (mereo-analytics-code e os run jobs Dagster).
#                              Chave: password.
#
#   mssql-debezium-creds     → credenciais que o Debezium SqlServerConnector
#                              usa para conectar no SQL Server externo
#                              (namespace mereo-sqlserver). Não é lido por
#                              env var — é montado como volume em
#                              /opt/kafka/external-configuration/mssql-creds/
#                              no pod do Kafka Connect, e cada KafkaConnector
#                              referencia as chaves via FileConfigProvider.
#                              Chave: debezium.properties (arquivo .properties).
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: dagster-postgresql
  namespace: mereo
type: Opaque
data:
  # test  (PoC — substituir por valor random em prod via ExternalSecrets/Vault)
  postgresql-password: dGVzdA==
---
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-dbt-credentials
  namespace: mereo
type: Opaque
data:
  # Piv96gq7Sb1roe2nQuEdEQ
  password: UGl2OTZncTdTYjFyb2UyblF1RWRFUQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: mssql-debezium-creds
  namespace: mereo
type: Opaque
data:
  # Conteúdo decodificado (arquivo .properties multilinha):
  #   database.hostname=mssql.mereo-sqlserver.svc.cluster.local
  #   database.port=1433
  #   database.user=sa
  #   database.password=MereoSim2026!
  debezium.properties: ZGF0YWJhc2UuaG9zdG5hbWU9bXNzcWwubWVyZW8tc3Fsc2VydmVyLnN2Yy5jbHVzdGVyLmxvY2FsCmRhdGFiYXNlLnBvcnQ9MTQzMwpkYXRhYmFzZS51c2VyPXNhCmRhdGFiYXNlLnBhc3N3b3JkPU1lcmVvU2ltMjAyNiE=
