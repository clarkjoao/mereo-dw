# ============================================================================
# ConfigMap: clickhouse-init-sql
# ============================================================================
# Script DDL canônico do warehouse:
#
#   raw      → ingestão CDC (Kafka engine + ReplacingMergeTree + MV)
#   gold     → modelos dbt (materializados pelo dbt-clickhouse)
#   pipeline → métricas operacionais (watermark, consumer lag, freshness)
#
# Fluxo de uma mensagem CDC dentro do ClickHouse:
#
#   raw.colaborador_kafka  ── Kafka engine (consumer ch-raw-colaborador-v2)
#         │
#         ▼ (raw.colaborador_mv: MATERIALIZED VIEW dispara em cada INSERT)
#   raw.colaborador        ── ReplacingMergeTree(_ts_ms, _deleted)
#                            • dedupe por (tenant_slug, id) → versão mais nova
#                            • _deleted=1 vira tombstone (filtrado em FINAL)
#
# Como aplicar: o init.sql NÃO roda automaticamente. Execute manualmente:
#   kubectl exec -n mereo chi-mereo-clickhouse-main-0-0-0 -- \
#     bash -c "clickhouse-client --multiquery < /docker-entrypoint-initdb.d/init.sql"
# Ou monte este ConfigMap como volume no podTemplate do CHI (alternativa em prod).
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init-sql
  namespace: mereo
data:
  init.sql: |
    -- ------------------------------------------------------------------
    -- Databases
    -- ------------------------------------------------------------------
    CREATE DATABASE IF NOT EXISTS raw;
    CREATE DATABASE IF NOT EXISTS bronze;
    CREATE DATABASE IF NOT EXISTS silver;
    CREATE DATABASE IF NOT EXISTS colaborador;
    CREATE DATABASE IF NOT EXISTS organizacao;
    CREATE DATABASE IF NOT EXISTS metricas;
    CREATE DATABASE IF NOT EXISTS avaliacao;
    CREATE DATABASE IF NOT EXISTS remuneracao;
    CREATE DATABASE IF NOT EXISTS referencia;
    CREATE DATABASE IF NOT EXISTS acao;
    CREATE DATABASE IF NOT EXISTS sucessao;
    CREATE DATABASE IF NOT EXISTS pdi;
    CREATE DATABASE IF NOT EXISTS gold;
    CREATE DATABASE IF NOT EXISTS pipeline;

    -- ------------------------------------------------------------------
    -- raw.colaborador — tabela destino da camada raw (multi-tenant)
    -- ------------------------------------------------------------------
    CREATE TABLE IF NOT EXISTS raw.colaborador (
        id Int64,
        tenant_slug String,
        nome Nullable(String),
        email Nullable(String),
        id_grupo_usuario Nullable(Int64),
        ativo Nullable(UInt8),
        _ts_ms UInt64,
        _deleted UInt8
    )
    ENGINE = ReplacingMergeTree(_ts_ms, _deleted)
    ORDER BY (tenant_slug, id);

    -- ------------------------------------------------------------------
    -- raw.colaborador_kafka — engine Kafka (consumer do tópico)
    -- Hostname encurtado: mesmo namespace que o Kafka.
    -- ------------------------------------------------------------------
    CREATE TABLE IF NOT EXISTS raw.colaborador_kafka (
        `ID` Int64,
        `NOME` Nullable(String),
        `EMAIL` Nullable(String),
        `ID_GRUPO_USUARIO` Nullable(Int64),
        `ATIVO` Nullable(Bool),
        tenant_slug String,
        ts_ms Nullable(UInt64),
        `__ts_ms` Nullable(UInt64),
        __deleted Nullable(String)
    )
    ENGINE = Kafka
    SETTINGS
        kafka_broker_list = 'mereo-kafka-kafka-bootstrap:9092',
        kafka_topic_list = 'raw.colaborador',
        kafka_group_name = 'ch-raw-colaborador-v2',
        kafka_format = 'JSONEachRow',
        kafka_num_consumers = 1,
        kafka_skip_broken_messages = 100;

    -- ------------------------------------------------------------------
    -- raw.colaborador_mv — MV que normaliza/copia para raw.colaborador.
    -- Renomeia colunas (UPPER → snake_case), faz cast de tipos,
    -- converte __deleted ("true"/"false") em UInt8 (1/0).
    -- ------------------------------------------------------------------
    CREATE MATERIALIZED VIEW IF NOT EXISTS raw.colaborador_mv
    TO raw.colaborador AS
    SELECT
        ID AS id,
        tenant_slug,
        NOME AS nome,
        EMAIL AS email,
        ID_GRUPO_USUARIO AS id_grupo_usuario,
        if(ATIVO IS NULL, NULL, toUInt8(ATIVO)) AS ativo,
        coalesce(ts_ms, __ts_ms, toUInt64(0)) AS _ts_ms,
        if(__deleted = 'true', toUInt8(1), toUInt8(0)) AS _deleted
    FROM raw.colaborador_kafka
    WHERE ID IS NOT NULL;

    -- ------------------------------------------------------------------
    -- pipeline.* — métricas operacionais
    -- (ingestion_snapshots + watermarks/lag: job Dagster raw_ingestion_observability;
    --  freshness_events: sensor raw_freshness_sensor; CronJob lag opcional/legado)
    -- ------------------------------------------------------------------
    CREATE TABLE IF NOT EXISTS pipeline.ingestion_snapshots (
        entity String,
        tenant_slug String,
        row_count UInt64,
        row_count_final UInt64,
        ch_max_ts_ms UInt64,
        kafka_lag Int64,
        snapshot_at DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = MergeTree()
    ORDER BY (entity, tenant_slug, snapshot_at);

    CREATE TABLE IF NOT EXISTS pipeline.entity_watermarks (
        entity String,
        ch_max_ts_ms UInt64,
        kafka_hi_offset Nullable(Int64),
        checked_at DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = ReplacingMergeTree(checked_at)
    ORDER BY entity;

    CREATE TABLE IF NOT EXISTS pipeline.consumer_lag_snapshots (
        consumer_group String,
        topic String,
        lag Int64,
        snapshot_at DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = MergeTree()
    ORDER BY (consumer_group, topic, snapshot_at);

    CREATE TABLE IF NOT EXISTS pipeline.freshness_events (
        entity String,
        dbt_blocked UInt8,
        reason String,
        at DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = MergeTree()
    ORDER BY (entity, at);

    CREATE TABLE IF NOT EXISTS pipeline.recovery_runs (
        run_id String,
        entity String,
        gap_from DateTime64(3),
        gap_to DateTime64(3),
        status String,
        rows_loaded UInt64,
        at DateTime64(3) DEFAULT now64(3)
    )
    ENGINE = MergeTree()
    ORDER BY (run_id, at);
