# ============================================================================
# Deployment + Service: analytics-code (gRPC user code location)
# ============================================================================
# Pod gRPC do Dagster (porta 3030) — webserver e daemon usam para descobrir
# definitions (assets, jobs, schedules, sensors).
#
# Imagem `python:3.12-slim` + pip install no `start.sh`. Hot reload via
# ConfigMap. Em prod: imagem custom com deps pre-instaladas (reduz cold start).
#
# Volumes (todos ConfigMap):
#   /config/dbt      → dbt-project (dbt_project.yml + profiles)
#   /config/models   → dbt-models (.sql + .yml)
#   /config/dagster  → dagster-code (Python + scripts, mode 0755)
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: analytics-code
  namespace: mereo
  labels:
    app: analytics-code
spec:
  type: ClusterIP
  selector:
    app: analytics-code
  ports:
    - name: grpc
      port: 3030
      targetPort: 3030
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-code
  namespace: mereo
  labels:
    app: analytics-code
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-code
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: analytics-code
    spec:
      containers:
        - name: grpc
          image: python:3.12-slim
          command:
            - /bin/bash
            - /config/dagster/start.sh
          ports:
            - name: grpc
              containerPort: 3030
          env:
            - name: DBT_TARGET
              value: k8s
            - name: DAGSTER_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagster-postgresql
                  key: postgresql-password
            - name: CH_DBT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-dbt-credentials
                  key: password
            - name: CH_HOST
              value: clickhouse-mereo-clickhouse
            - name: CH_PORT
              value: "8123"
            - name: CH_USER
              value: dbt
            - name: CH_RAW_CONSUMER_GROUP
              value: ch-raw-colaborador-v2
            - name: MEREPO_PILOT_ENTITY
              value: colaborador
          readinessProbe:
            tcpSocket:
              port: 3030
            initialDelaySeconds: 90    # cobre pip install + dbt parse
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - mountPath: /config/dbt
              name: dbt-config
            - mountPath: /config/models
              name: dbt-models
              readOnly: true
            - mountPath: /config/macros
              name: dbt-macros
              readOnly: true
            - mountPath: /config/dagster
              name: dagster-code
      volumes:
        - name: dbt-config
          configMap:
            name: dbt-project
        - name: dbt-models
          configMap:
            name: dbt-models
        - name: dbt-macros
          configMap:
            name: dbt-macros
        - name: dagster-code
          configMap:
            name: dagster-code
            defaultMode: 493   # 0755 — scripts executáveis
