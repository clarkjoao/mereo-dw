# ============================================================================
# Deployment + Service: dagster-webserver (UI + GraphQL API)
# ============================================================================
# Webserver do Dagster — lê definitions do user code via gRPC (workspace.yaml
# aponta para analytics-code:3030) e persistência via Postgres.
#
# Exposto via Ingress (ver 15-ingresses.yaml) em http://dagster.mereo.local.
# Sem auth no webserver — proteger via Ingress/middleware em prod.
#
# Diferenças vs daemon:
#   - strategy: RollingUpdate (stateless — pode escalar replicas).
#   - readinessProbe HTTP `/server_info` (mais semântico que TCP).
#   - SEM o sitecustomize patch — webserver não chama a API do Kubernetes.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dagster-webserver
  namespace: mereo
  labels:
    app: dagster
    component: webserver
spec:
  type: ClusterIP
  selector:
    app: dagster
    component: webserver
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dagster-webserver
  namespace: mereo
  labels:
    app: dagster
    component: webserver
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: dagster
      component: webserver
  template:
    metadata:
      labels:
        app: dagster
        component: webserver
    spec:
      serviceAccountName: dagster
      automountServiceAccountToken: true
      initContainers:
        - name: wait-postgres
          image: docker.io/library/postgres:14.6
          command:
            - sh
            - -c
            - until pg_isready -h dagster-postgresql -p 5432 -U dagster; do echo waiting for database; sleep 2; done;
      containers:
        - name: webserver
          image: docker.io/dagster/dagster-celery-k8s:1.13.6
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -c
            - dagster-webserver -h 0.0.0.0 -p 80 -w /dagster-workspace/workspace.yaml
          env:
            - name: DAGSTER_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagster-postgresql
                  key: postgresql-password
          envFrom:
            - configMapRef:
                name: dagster-env
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /server_info
              port: 80
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: dagster-instance
              mountPath: /opt/dagster/dagster_home/dagster.yaml
              subPath: dagster.yaml
            - name: dagster-workspace
              mountPath: /dagster-workspace/
      volumes:
        - name: dagster-instance
          configMap:
            name: dagster-instance
        - name: dagster-workspace
          configMap:
            name: dagster-workspace
