# ============================================================================
# KafkaConnectors: Debezium SqlServerConnector × 3 tenants
# ============================================================================
# Cada CR vira uma task no Kafka Connect `mereo-connect` que monitora UM
# banco do SQL Server (em mereo-sqlserver) e publica em `raw.colaborador`.
#
# Fluxo (Debezium SqlServer):
#   1. snapshot inicial sem lock → estado atual de dbo.COLABORADOR.
#   2. tail do log CDC (cdc.fn_cdc_get_all_changes_*) com poll 500ms.
#   3. transforms (ordem importa):
#        unwrap  → achata payload Debezium em single row + __op/__ts_ms/__deleted
#        reroute → manda TUDO para raw.colaborador (descarta prefixo por tenant)
#        tenant  → injeta campo tenant_slug ("afya" | "staging" | "allos")
#
# Por que 3 conectores em vez de 1 com várias `database.names`?
#   Cada tenant precisa de `topic.prefix` próprio (Debezium isola offset/state
#   por prefix) e de um tenant_slug distinto via InsertField.
#
# Schema history em tópico Kafka `mereogr.schema-history` (compartilhado pelos
# 3 connectors — Debezium discrimina por prefix no payload).
# ----------------------------------------------------------------------------
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaConnector
metadata:
  name: mereogr-afya-colaborador
  namespace: mereo
  labels:
    strimzi.io/cluster: mereo-connect
spec:
  class: io.debezium.connector.sqlserver.SqlServerConnector
  tasksMax: 1
  config:
    # Conexão SQL Server (chaves vindas do Secret via FileConfigProvider)
    database.hostname: ${file:/opt/kafka/external-configuration/mssql-creds/debezium.properties:database.hostname}
    database.port:     ${file:/opt/kafka/external-configuration/mssql-creds/debezium.properties:database.port}
    database.user:     ${file:/opt/kafka/external-configuration/mssql-creds/debezium.properties:database.user}
    database.password: ${file:/opt/kafka/external-configuration/mssql-creds/debezium.properties:database.password}
    database.encrypt: "false"
    database.trustServerCertificate: "true"
    database.names: MereoGR-Afya
    table.include.list: dbo.COLABORADOR
    snapshot.mode: initial
    snapshot.locking.mode: none
    poll.interval.ms: "500"
    heartbeat.interval.ms: "10000"
    tombstones.on.delete: "true"
    schema.history.internal.kafka.bootstrap.servers: mereo-kafka-kafka-bootstrap:9092
    schema.history.internal.kafka.topic: mereogr.schema-history
    topic.prefix: mereogr-afya
    key.converter: org.apache.kafka.connect.json.JsonConverter
    key.converter.schemas.enable: "false"
    value.converter: org.apache.kafka.connect.json.JsonConverter
    value.converter.schemas.enable: "false"
    transforms: unwrap,reroute,tenant
    transforms.unwrap.type: io.debezium.transforms.ExtractNewRecordState
    transforms.unwrap.delete.handling.mode: rewrite
    transforms.unwrap.add.fields: op:en,source.ts_ms:ts_ms
    transforms.reroute.type: io.debezium.transforms.ByLogicalTableRouter
    transforms.reroute.topic.regex: .*
    transforms.reroute.topic.replacement: raw.colaborador
    transforms.tenant.type: org.apache.kafka.connect.transforms.InsertField$Value
    transforms.tenant.static.field: tenant_slug
    transforms.tenant.static.value: afya
---
