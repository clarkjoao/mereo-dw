# ============================================================================
# RBAC para o Dagster
# ============================================================================
# O dagster-daemon usa o K8sRunLauncher: cada run vira um Kubernetes Job no
# namespace `mereo`. Para criar/observar/cancelar esses jobs, o pod do daemon
# precisa de permissões — daí esta Role.
#
# Princípio do menor privilégio: limita ao namespace `mereo` e a 2 grupos
# (`batch` para Jobs e `""` para Pods/Events/Logs). Sem acesso a Secrets ou
# a outros namespaces.
#
# automountServiceAccountToken: false na SA → cada pod que QUER o token monta
# manualmente via automountServiceAccountToken: true no template do Deployment
# (daemon e webserver fazem isso).
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dagster
  namespace: mereo
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dagster
  namespace: mereo
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: [create, delete, deletecollection, get, list, patch, update, watch]
  - apiGroups: ["batch"]
    resources: ["jobs/status"]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: [create, delete, deletecollection, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: ["pods/log", "pods/status"]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dagster
  namespace: mereo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dagster
subjects:
  - kind: ServiceAccount
    name: dagster
