# ============================================================================
# CronJob: pipeline-lag-snapshot
# ============================================================================
# A cada 5min, snapshot o estado operacional do pipeline:
#   1. pipeline.entity_watermarks ← MAX(_ts_ms) de raw.colaborador
#      → indica "até quando temos dados em ClickHouse" para o entity.
#   2. pipeline.consumer_lag_snapshots ← lag agregado do consumer
#      `ch-raw-colaborador` (Kafka engine do ClickHouse), via
#      system.kafka_consumers.
#
# Essas tabelas alimentam:
#   - raw_freshness_sensor do Dagster (libera dbt build se há dados frescos).
#   - dashboards de observabilidade na camada gold.
#
# concurrencyPolicy: Forbid → pula execução se a anterior ainda roda.
# Host encurtado: mesmo namespace.
# ----------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pipeline-lag-snapshot
  namespace: mereo
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: snapshot
              image: clickhouse/clickhouse-server:24.3
              command:
                - /bin/bash
                - -ec
                - |
                  HOST="clickhouse-mereo-clickhouse"
                  clickhouse-client --host "$HOST" --multiquery --query "
                  INSERT INTO pipeline.entity_watermarks (entity, ch_max_ts_ms, checked_at)
                  SELECT 'colaborador', coalesce(max(_ts_ms), 0), now64(3) FROM raw.colaborador;

                  INSERT INTO pipeline.consumer_lag_snapshots (consumer_group, topic, lag, snapshot_at)
                  SELECT group, table, coalesce(sum(num_messages - coalesce(offset, 0)), 0), now64(3)
                  FROM system.kafka_consumers
                  WHERE group = 'ch-raw-colaborador'
                  GROUP BY group, table;
                  "
                  echo "pipeline snapshot OK"
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
