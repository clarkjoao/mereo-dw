# ============================================================================
# Postgres interno do Dagster
# ============================================================================
# Banco usado pelo Dagster como run_storage, event_log_storage e
# schedule_storage (metadados de execução do orquestrador — NÃO confundir
# com o data warehouse ClickHouse).
#
# Origem: chart bitnami/postgresql v8.1.0 simplificado (labels Helm removidas).
# Mantém o wrapper bitnami só para o initContainer de chmod inicial.
#
# Service headless (`-headless`) é o serviceName do StatefulSet para DNS
# estável do pod. Service regular (sem suffix) é o ClusterIP que os clientes
# usam — note o nome curto `dagster-postgresql` (não `mereo-dagster-...`).
#
# Tamanho do PVC: 8Gi. Em prod, considere substituir por CloudNativePG
# (já presente no cluster em cnpg-system) para HA + backups automáticos.
# ----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: dagster-postgresql
  namespace: mereo
  labels:
    app: dagster-postgresql
spec:
  type: ClusterIP
  selector:
    app: dagster-postgresql
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: tcp-postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: dagster-postgresql-headless
  namespace: mereo
  labels:
    app: dagster-postgresql
spec:
  type: ClusterIP
  clusterIP: None     # headless → DNS retorna IP do pod
  selector:
    app: dagster-postgresql
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: tcp-postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dagster-postgresql
  namespace: mereo
  labels:
    app: dagster-postgresql
spec:
  replicas: 1
  serviceName: dagster-postgresql-headless
  selector:
    matchLabels:
      app: dagster-postgresql
  template:
    metadata:
      labels:
        app: dagster-postgresql
    spec:
      securityContext:
        fsGroup: 1001
      initContainers:
        - name: init-chmod-data
          image: docker.io/bitnami/minideb:stretch
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /bitnami/postgresql/data
              chmod 700 /bitnami/postgresql/data
              find /bitnami/postgresql -mindepth 0 -maxdepth 1 \
                   -not -name ".snapshot" -not -name "lost+found" | \
                xargs chown -R 1001:1001
              chmod -R 777 /dev/shm
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
            - name: dshm
              mountPath: /dev/shm
      containers:
        - name: postgres
          image: docker.io/library/postgres:14.6
          securityContext:
            runAsUser: 1001
          ports:
            - name: tcp-postgresql
              containerPort: 5432
          env:
            - name: PGDATA
              value: /bitnami/postgresql/data
            - name: POSTGRES_USER
              value: dagster
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dagster-postgresql
                  key: postgresql-password
            - name: POSTGRES_DB
              value: dagster
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U dagster -d dagster -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U dagster -d dagster -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: data
              mountPath: /bitnami/postgresql
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 8Gi
